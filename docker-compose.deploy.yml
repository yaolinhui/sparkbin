version: "3.8"

# Deployment compose for Alibaba Cloud server
# Only backend + postgres; frontend is served by Vercel

services:
  postgres:
    image: postgres:15-alpine
    container_name: sparkbin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sparkbin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sparkbin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparkbin} -d ${POSTGRES_DB:-sparkbin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sparkbin-net

  backend:
    image: sparkbin-backend:latest
    container_name: sparkbin-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sparkbin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sparkbin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sparkbin-net

volumes:
  postgres_data:

networks:
  sparkbin-net:
    driver: bridge
