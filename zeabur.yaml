version: "v2"
services:
  backend:
    name: sparkbin-backend
    type: Dockerfile
    Dockerfile: docker/Dockerfile.backend
    ports:
      - port: 8000
        targetPort: 8000
    env:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: ENCRYPTION_KEY
        value: ${ENCRYPTION_KEY}
      - key: RESEND_API_KEY
        value: ${RESEND_API_KEY}
      - key: STRIPE_SECRET_KEY
        value: ${STRIPE_SECRET_KEY}
      - key: STRIPE_WEBHOOK_SECRET
        value: ${STRIPE_WEBHOOK_SECRET}
      - key: FRONTEND_URL
        value: ${FRONTEND_URL}
      - key: DEPLOYMENT_MODE
        value: saas
      - key: ENABLE_PAYMENTS
        value: true
      - key: ENABLE_SAAS_FEATURES
        value: true
      - key: CREDITS_GRANT_ON_REGISTER
        value: 20
