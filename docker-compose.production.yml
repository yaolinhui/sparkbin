version: "3.8"

# Production Docker Compose
# Uses pre-built images from GitHub Container Registry
# Configure Caddy/Traefik for auto HTTPS

services:
  postgres:
    image: postgres:15-alpine
    container_name: sparkbin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sparkbin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sparkbin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparkbin} -d ${POSTGRES_DB:-sparkbin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sparkbin-net

  backend:
    image: ghcr.io/yourname/sparkbin-backend:latest
    container_name: sparkbin-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sparkbin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sparkbin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sparkbin-net

  frontend:
    image: ghcr.io/yourname/sparkbin-frontend:latest
    container_name: sparkbin-frontend
    restart: unless-stopped
    networks:
      - sparkbin-net

  # Caddy: Automatic HTTPS reverse proxy
  # Requires a Caddyfile with your domain configured
  caddy:
    image: caddy:2-alpine
    container_name: sparkbin-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - sparkbin-net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  sparkbin-net:
    driver: bridge
